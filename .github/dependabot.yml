version: 2

updates:
    # Dependencias Node (pnpm / npm ecosystem)
    - package-ecosystem: 'npm'
      directory: '/'
      target-branch: 'develop'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '06:00'
      open-pull-requests-limit: 5
      versioning-strategy: increase
      commit-message:
          prefix: 'chore(deps)'
          include: 'scope'
      labels:
          - 'dependencies'
          - 'automated'

    # GitHub Actions (si usas workflows)
    - package-ecosystem: 'github-actions'
      directory: '/'
      target-branch: 'develop'
      schedule:
          interval: 'weekly'
      labels:
          - 'dependencies'
          - 'ci'
