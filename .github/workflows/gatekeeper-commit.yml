name: Gatekeeper Commit ADU

on:
    pull_request:
        types: [opened, synchronize, reopened]
        branches:
            - main
            - develop

jobs:
    validate-commits:
        name: Validate ADU Commits
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Validate commit messages and atomicity
              run: |
                  echo "Validating ADU commits for PR #${{ github.event.pull_request.number }}"
                  BASE_SHA="${{ github.event.pull_request.base.sha }}"
                  HEAD_SHA="${{ github.event.pull_request.head.sha }}"
                  echo "Base SHA: $BASE_SHA"
                  echo "Head SHA: $HEAD_SHA"
                  COMMITS=$(git log --oneline "$BASE_SHA..$HEAD_SHA" | wc -l)
                  echo "Number of commits in PR: $COMMITS"
                  if [ "$COMMITS" -eq 0 ]; then
                    echo "No commits found in PR range"
                    exit 0
                  fi
                  node scripts/validate-commits.mjs "$BASE_SHA" "$HEAD_SHA"

            - name: Gatekeeper deterministic report contract
              run: pnpm gatekeeper:report --require-complete-report --secret-scan-staged
